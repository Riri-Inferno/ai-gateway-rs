name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ai-gateway-rs

jobs:
  # ===================================
  # テスト: PR / push 両方で実行
  # ===================================
  test:
    name: cargo test (docker compose)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run tests via docker compose
        run: |
          docker compose build test
          docker compose run --rm test

  # ===================================
  # GHCR push: push イベントのみ
  # PRでは実行されない
  # ===================================
  build-and-push:
    name: Build and push to GHCR
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # ブランチ追従タグ: develop, main
            type=ref,event=branch
            # セマンティックバージョンタグ: v1.2.3 → 1.2.3 / 1.2 / 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # コミット固定タグ: sha-abc1234
            type=sha,prefix=sha-,format=short
            # latest は main マージ または v* タグ push のみに付与
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUST_VERSION=1.95
            APP_NAME=server
          cache-from: type=gha
          cache-to: type=gha,mode=max
